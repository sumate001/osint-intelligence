# Shared location blocks — included by both HTTP and HTTPS server blocks

# API — FastAPI backend
location /api/ {
    proxy_pass         http://api;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;  # allow long LLM calls
}

# API docs (Swagger / ReDoc)
location ~ ^/(docs|redoc|openapi\.json)$ {
    proxy_pass         http://api;
    proxy_set_header   Host $host;
}

# Health endpoint (unauthenticated)
location /health {
    proxy_pass http://api;
}

# WebSocket — investigation scan + simulation progress
location /ws/ {
    proxy_pass             http://api;
    proxy_http_version     1.1;
    proxy_set_header       Upgrade           $http_upgrade;
    proxy_set_header       Connection        $connection_upgrade;
    proxy_set_header       Host              $host;
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
}

# Server-Sent Events — notification stream
location /api/v1/events {
    proxy_pass         http://api;
    proxy_set_header   Host $host;
    proxy_set_header   X-Accel-Buffering no;  # disable nginx buffering for SSE
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 3600s;
}

# Frontend — Next.js (everything else)
location / {
    proxy_pass         http://frontend;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
